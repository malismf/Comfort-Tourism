<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFS — Прогноз TCI</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>
<body>

<header>
  <h1>GFS — прогноз TCI</h1>
  <div class="sub">Иркутская область · туристический климатический индекс по муниципальным образованиям</div>
</header>

<div class="run-meta" id="run-meta">Загрузка прогона…</div>

<div class="map-wrap">
  <div id="map">
    <div class="placeholder"><div class="spinner"></div><span>Загрузка карты…</span></div>
  </div>
</div>

<div class="days">
  <div class="label">День прогноза</div>
  <div class="track" id="track"><span class="loading-text">Загрузка…</span></div>
</div>

<script>
  let geojson   = null;
  let availDays = [];
  let currentDay = null;

  const RU_MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

  // ── Старт ──
  (async () => {
    if (typeof Plotly === 'undefined') {
      return showError('Не удалось загрузить библиотеку Plotly');
    }
    try {
      const [gj, days] = await Promise.all([
        fetch('/api/geojson').then(r => r.json()),
        fetch('/api/gfs/days').then(r => r.json()),
      ]);
      if (gj.error)   return showError('Ошибка GeoJSON: ' + gj.error);
      if (days.error) return showError('Ошибка дней: ' + days.error);

      geojson   = gj;
      availDays = Array.isArray(days) ? days : [];
      renderDays();

      if (availDays.length) selectDay(availDays[0].day);
      else showError('В базе нет данных прогноза');
    } catch (e) {
      showError('Сетевая ошибка: ' + e.message);
    }
  })();

  // ── Кнопки дней ──
  function renderDays() {
    const track = document.getElementById('track');
    track.innerHTML = '';
    availDays.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'day';
      btn.dataset.day = d.day;
      btn.innerHTML = `<span class="dn">+${d.day}</span><span class="dd">${d.date ? fmtShort(d.date) : ''}</span>`;
      btn.addEventListener('click', () => selectDay(d.day));
      track.appendChild(btn);
    });
  }

  function selectDay(day) {
    currentDay = day;
    document.querySelectorAll('.day').forEach(b =>
      b.classList.toggle('active', +b.dataset.day === day)
    );
    loadMap(day);
  }

  // ── Загрузка и отрисовка ──
  async function loadMap(forecastDay) {
    let res;
    try {
      res = await fetch(`/api/gfs/tci?forecast_day=${forecastDay}`).then(r => r.json());
    } catch (e) {
      return showError('Сетевая ошибка: ' + e.message);
    }
    if (res.error) return showError(res.error);

    updateRunMeta(res);

    if (!res.data || !res.data.length) {
      return showError(`Нет данных для дня +${forecastDay}`);
    }
    drawMap(res.data);
  }

  function drawMap(data) {
    const trace = {
      type:         'choroplethmapbox',
      geojson:      geojson,
      featureidkey: 'properties.name',
      locations:    data.map(d => d.name),
      z:            data.map(d => d.tci ?? null),
      customdata:   data.map(d => [d.name, d.tci, d.date_local, tciLabel(d.tci)]),
      colorscale:   'RdYlGn',
      zmin: 0, zmax: 100,
      marker:   { opacity: 0.85, line: { width: 0.6, color: 'rgba(0,0,0,0.25)' } },
      colorbar: {
        title:       { text: 'TCI', font: { color: '#52525b', size: 12 } },
        tickfont:    { color: '#52525b', size: 11 },
        thickness:   12,
        len:         0.7,
        outlinewidth: 0,
        ticks:       'outside',
        ticklen:     3,
      },
      hovertemplate:
        '<b>%{customdata[0]}</b><br>' +
        'TCI: %{customdata[1]:.1f} — %{customdata[3]}<br>' +
        'Дата: %{customdata[2]}<extra></extra>',
    };

    const layout = {
      mapbox: { style: 'carto-positron', zoom: 5.0, center: { lat: 57.0, lon: 105.0 } },
      height: 560,
      margin: { r: 0, t: 0, l: 0, b: 0 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      font: { family: '-apple-system, system-ui, sans-serif' },
    };

    try {
      // newPlot сам очищает контейнер (включая спиннер) и инициализирует карту
      Plotly.newPlot('map', [trace], layout, {
        responsive: true,
        displayModeBar: false,
      });
    } catch (e) {
      showError('Ошибка отрисовки: ' + e.message);
    }
  }

  // ── Мета-строка ──
  function updateRunMeta(res) {
    const forecastDate = res.data?.[0]?.date_local;
    const cycle = String(res.cycle ?? 0).padStart(2, '0');
    document.getElementById('run-meta').innerHTML =
      `Прогон <span class="v">№${res.run_id ?? '—'}</span>` +
      `<span class="dot">·</span>запуск <span class="v">${res.run_date ? fmtFull(res.run_date) : '—'}, ${cycle} UTC</span>` +
      `<span class="dot">·</span>прогноз на <span class="v">${forecastDate ? fmtFull(forecastDate) : '—'}</span> (+${res.forecast_day} дн.)`;
  }

  // ── Состояния ──
  function showError(msg) {
    document.getElementById('map').innerHTML =
      `<div class="placeholder error">${msg}</div>`;
  }

  // ── Формат дат ──
  function fmtShort(iso) {
    const p = iso.split('-');
    if (p.length < 3) return iso;
    return `${parseInt(p[2],10)} ${RU_MONTHS[parseInt(p[1],10)-1]}`;
  }
  function fmtFull(iso) {
    const p = iso.split('-');
    if (p.length < 3) return iso;
    return `${parseInt(p[2],10)} ${RU_MONTHS[parseInt(p[1],10)-1]} ${p[0]}`;
  }

  function tciLabel(tci) {
    if (tci == null) return 'нет данных';
    if (tci >= 90) return 'идеально';
    if (tci >= 80) return 'отлично';
    if (tci >= 70) return 'очень хорошо';
    if (tci >= 60) return 'хорошо';
    if (tci >= 50) return 'приемлемо';
    if (tci >= 40) return 'нежелательно';
    return 'неблагоприятно';
  }
</script>
</body>
</html>
